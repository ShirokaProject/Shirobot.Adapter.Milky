name: Build Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag name, for example v1.0.0"
        required: true
        type: string

permissions:
  contents: write

env:
  PROJECT_FILE: ShiroBot.MilkyAdapter.csproj
  TEST_PROJECT: tests/ShiroBot.MilkyAdapter.Tests/ShiroBot.MilkyAdapter.Tests.csproj
  PUBLISH_DIR: artifacts/publish

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore package references
        run: dotnet restore "$TEST_PROJECT"

      - name: Test package references
        run: >-
          dotnet test "$TEST_PROJECT" --configuration Release --no-restore
          -p:CopyAdapterToHost=false

      - name: Publish plugin
        run: >-
          dotnet publish "$PROJECT_FILE" --configuration Release
          --no-restore
          --output "$PUBLISH_DIR"
          -p:CopyAdapterToHost=false

      - name: Validate and collect plugin DLL
        shell: bash
        run: |
          shopt -s nullglob
          dlls=("$PUBLISH_DIR"/*.dll)
          if [ "${#dlls[@]}" -ne 1 ]; then
            printf 'Expected exactly one DLL in %s, found %s\n' "$PUBLISH_DIR" "${#dlls[@]}"
            printf '%s\n' "${dlls[@]}"
            exit 1
          fi
          PLUGIN_DLL="$PUBLISH_DIR/ShiroBot.MilkyAdapter.dll"
          if [ "${dlls[0]}" != "$PLUGIN_DLL" ]; then
            printf 'Unexpected plugin DLL: %s\n' "${dlls[0]}"
            exit 1
          fi
          mkdir -p release
          cp "$PLUGIN_DLL" release/

      - name: Upload DLL to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
          target_commitish: ${{ github.sha }}
          files: release/*.dll
