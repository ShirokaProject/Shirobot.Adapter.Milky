name: Pull Request CI

on:
  pull_request:

permissions:
  contents: read

env:
  PROJECT_FILE: ShiroBot.MilkyAdapter.csproj
  TEST_PROJECT: tests/ShiroBot.MilkyAdapter.Tests/ShiroBot.MilkyAdapter.Tests.csproj
  PUBLISH_DIR: artifacts/publish

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore package references
        run: dotnet restore "$TEST_PROJECT"

      - name: Test package references
        run: >-
          dotnet test "$TEST_PROJECT" --configuration Release --no-restore
          -p:CopyAdapterToHost=false

      - name: Publish plugin
        run: >-
          dotnet publish "$PROJECT_FILE" --configuration Release
          --no-restore
          --output "$PUBLISH_DIR"
          -p:CopyAdapterToHost=false

      - name: Validate single-DLL package
        shell: bash
        run: |
          shopt -s nullglob
          dlls=("$PUBLISH_DIR"/*.dll)
          if [ "${#dlls[@]}" -ne 1 ] || [ "${dlls[0]:-}" != "$PUBLISH_DIR/ShiroBot.MilkyAdapter.dll" ]; then
            printf 'Expected only %s/ShiroBot.MilkyAdapter.dll\n' "$PUBLISH_DIR"
            printf '%s\n' "${dlls[@]}"
            exit 1
          fi
